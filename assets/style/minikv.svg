<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b7db1"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>

  <text x="40" y="58" fill="#ffffff" font-size="30" font-weight="700">MiniKV</text>
  <text x="40" y="86" fill="#8aa0c8" font-size="16">Write-optimized key-value store on an LSM-Tree</text>

  <!-- write -->
  <g>
    <circle cx="90" cy="200" r="34" fill="#22243f" stroke="#ED8B00" stroke-width="2"/>
    <text x="90" y="196" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">put</text>
    <text x="90" y="213" fill="#8aa0c8" font-size="11" text-anchor="middle">(k, v)</text>
  </g>

  <!-- WAL -->
  <g>
    <rect x="170" y="160" width="130" height="80" rx="10" fill="#22243f" stroke="#3a3f66" stroke-width="1.5"/>
    <text x="235" y="195" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">WAL</text>
    <text x="235" y="216" fill="#8aa0c8" font-size="11" text-anchor="middle">durable append log</text>
  </g>

  <!-- MemTable -->
  <g>
    <rect x="345" y="160" width="130" height="80" rx="10" fill="#22243f" stroke="#3a3f66" stroke-width="1.5"/>
    <text x="410" y="190" fill="#ffffff" font-size="15" font-weight="700" text-anchor="middle">MemTable</text>
    <text x="410" y="210" fill="#8aa0c8" font-size="11" text-anchor="middle">in-memory</text>
    <text x="410" y="224" fill="#8aa0c8" font-size="11" text-anchor="middle">sorted map</text>
  </g>

  <!-- SSTables -->
  <g>
    <rect x="540" y="148" width="150" height="104" rx="10" fill="#22243f" stroke="#3a3f66" stroke-width="1.5"/>
    <rect x="560" y="166" width="110" height="18" rx="4" fill="#2c2f52"/>
    <rect x="560" y="190" width="110" height="18" rx="4" fill="#2c2f52"/>
    <rect x="560" y="214" width="110" height="18" rx="4" fill="#2c2f52"/>
    <text x="615" y="179" fill="#9fb3d6" font-size="11" text-anchor="middle">SSTable</text>
    <text x="615" y="203" fill="#9fb3d6" font-size="11" text-anchor="middle">SSTable</text>
    <text x="615" y="227" fill="#9fb3d6" font-size="11" text-anchor="middle">SSTable</text>
    <text x="615" y="135" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">SSTables on disk</text>
  </g>

  <!-- arrows -->
  <line x1="126" y1="200" x2="166" y2="200" stroke="#5b7db1" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="302" y1="200" x2="341" y2="200" stroke="#5b7db1" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="477" y1="200" x2="536" y2="200" stroke="#5b7db1" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <text x="500" y="192" fill="#8aa0c8" font-size="11" text-anchor="middle">flush</text>

  <!-- bloom filter -->
  <g>
    <rect x="540" y="300" width="220" height="58" rx="10" fill="#22243f" stroke="#57d131" stroke-width="1.5"/>
    <text x="650" y="324" fill="#57d131" font-size="13" font-weight="700" text-anchor="middle">Bloom filter</text>
    <text x="650" y="343" fill="#8aa0c8" font-size="11" text-anchor="middle">skips SSTables that can't hold the key</text>
  </g>
  <line x1="615" y1="299" x2="615" y2="254" stroke="#57d131" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow2)"/>

  <text x="40" y="330" fill="#ffffff" font-size="15" font-weight="600">Sequential writes,</text>
  <text x="40" y="350" fill="#ffffff" font-size="15" font-weight="600">fast reads at scale</text>

  <g font-size="12" fill="#8aa0c8">
    <rect x="40" y="408" width="720" height="0.6" fill="#3a3f66"/>
    <text x="40" y="432">Java</text>
    <text x="95" y="432">·  LSM-Tree</text>
    <text x="185" y="432">·  WAL</text>
    <text x="245" y="432">·  SSTables</text>
    <text x="335" y="432">·  Bloom Filters</text>
  </g>
</svg>
